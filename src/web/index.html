<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cymate — Signal Research Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #FD5E02;
      --accent: #00E6FF;
      --page: #1b2950;
      --card: #233362;
      --panel: #2b3d70;
      --border: #34457a;
      --text: #FFF8E4;
      --muted: #aeb8d4;
      --on-primary: #1b2950;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', Arial, Helvetica, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #2c3f73 0%, var(--page) 60%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 40px 16px 80px; }
    header { text-align: center; color: var(--text); margin-bottom: 28px; }
    .word { font-family: 'Inter Tight', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
    .word .dot { color: var(--primary); }
    .tag { color: var(--muted); font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 4px; }
    .h1 { font-family: 'Inter Tight', sans-serif; font-size: 22px; font-weight: 600; margin-top: 22px; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin: 12px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; outline: none;
      background: var(--page); color: var(--text);
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(253, 94, 2, 0.18); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 200px; }
    button {
      margin-top: 18px; width: 100%; padding: 13px 18px; border: 0; border-radius: 10px; cursor: pointer;
      font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 700; color: var(--on-primary);
      background: var(--primary);
      transition: transform 0.05s ease, opacity 0.2s ease;
    }
    button:hover { opacity: 0.94; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .status { margin-top: 18px; color: var(--text); text-align: center; min-height: 22px; font-size: 14px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ffb4b4; }
    #result { margin-top: 28px; }
    details { margin-top: 16px; color: var(--muted); }
    summary { cursor: pointer; font-size: 13px; }
    pre {
      background: var(--page); color: var(--muted); padding: 14px; border-radius: 10px;
      border: 1px solid var(--border);
      overflow: auto; font-size: 12px; line-height: 1.5; max-height: 360px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="/brand/logo.png" alt="Cymate" style="height:48px;display:inline-block;" onerror="this.style.display='none';document.getElementById('wm').style.display='block';" />
      <div id="wm" class="word" style="display:none;">Cymate<span class="dot">.</span></div>
      <div class="tag">AI Outbound Systems for B2B SaaS</div>
      <div class="h1">Signal Research Engine</div>
    </header>

    <div class="card">
      <label for="input">Company domain or work email</label>
      <input id="input" type="text" placeholder="acme.com  or  jane@acme.com" autocomplete="off" />

      <label for="email">Email the report to (optional)</label>
      <input id="email" type="email" placeholder="you@company.com" autocomplete="off" />

      <div class="hint">Deep research runs in the background and can take 10–20 minutes. Keep this tab open; the report appears here when ready. If you enter an email, we also send it there.</div>

      <button id="run">Run research</button>
      <div class="status" id="status"></div>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const inputEl = $("input");
    const emailEl = $("email");
    const runEl = $("run");
    const statusEl = $("status");
    const resultEl = $("result");

    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
    runEl.addEventListener("click", run);

    async function run() {
      const input = inputEl.value.trim();
      const email = emailEl.value.trim();
      resultEl.innerHTML = "";
      if (!input) { setError("Enter a domain or work email."); return; }

      runEl.disabled = true;
      const started = Date.now();
      const elapsed = () => Math.round((Date.now() - started) / 1000) + "s";

      try {
        statusEl.className = "status";
        statusEl.innerHTML = '<span class="spinner"></span> Starting deep research…';

        const res = await fetch("/api/research", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(email ? { input, email } : { input }),
        });
        const start = await res.json();
        if (!res.ok) { setError(start.error || ("Request failed (" + res.status + ")")); return; }

        // Poll the job until it completes. Deep research can take several minutes.
        const statusUrl = start.statusUrl || ("/api/research/" + start.jobId);
        while (true) {
          await sleep(5000);
          const pr = await fetch(statusUrl);
          const job = await pr.json();
          if (!pr.ok) { setError(job.error || ("Status check failed (" + pr.status + ")")); return; }

          if (job.status === "done") {
            statusEl.innerHTML = "";
            render(job);
            return;
          }
          if (job.status === "error") { setError("Research failed: " + (job.error || "unknown")); return; }
          statusEl.innerHTML = '<span class="spinner"></span> Deep research running… (' + elapsed() + ')';
        }
      } catch (err) {
        setError("Network error: " + err.message);
      } finally {
        runEl.disabled = false;
      }
    }

    function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

    function render(data) {
      const bar = document.createElement("div");
      bar.style.cssText = "display:flex;gap:10px;margin-bottom:14px;";
      const copyBtn = document.createElement("button");
      copyBtn.textContent = "Copy report text";
      copyBtn.style.cssText = "width:auto;margin-top:0;padding:9px 14px;font-size:13px;";
      copyBtn.onclick = async () => {
        try { await navigator.clipboard.writeText(data.formattedText || ""); copyBtn.textContent = "Copied"; }
        catch { copyBtn.textContent = "Copy failed"; }
        setTimeout(() => (copyBtn.textContent = "Copy report text"), 2000);
      };
      const dlBtn = document.createElement("button");
      dlBtn.textContent = "Download .html";
      dlBtn.style.cssText = "width:auto;margin-top:0;padding:9px 14px;font-size:13px;background:#2b3d70;color:#FFF8E4;";
      dlBtn.onclick = () => {
        const blob = new Blob([data.formattedHTML || ""], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "cymate-signal-report.html";
        a.click();
        URL.revokeObjectURL(a.href);
      };
      bar.appendChild(copyBtn);
      bar.appendChild(dlBtn);

      const card = document.createElement("div");
      card.innerHTML = data.formattedHTML;

      const meta = document.createElement("details");
      meta.innerHTML =
        "<summary>View raw JSON response</summary><pre>" +
        escapeHtml(JSON.stringify(data, null, 2)) +
        "</pre>";

      resultEl.appendChild(bar);
      resultEl.appendChild(card);
      resultEl.appendChild(meta);
    }

    function setError(msg) {
      statusEl.className = "status error";
      statusEl.textContent = msg;
    }

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }
  </script>
</body>
</html>
